<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM Center — HR Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0e2b28; --ink-soft:#3d5652; --muted:#6b827e;
    --brand:#0f766e; --brand-600:#0d8f83; --brand-050:#e7f2f0;
    --bg:#f3f7f6; --surface:#ffffff; --line:#e0ebe8; --line-strong:#c9dcd8;
    --font-d:'Plus Jakarta Sans',system-ui,sans-serif;
    --font-b:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-b);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;width:100%;text-align:center}
  .mark{width:52px;height:52px;border-radius:13px;background:linear-gradient(150deg,var(--brand),#0b5c55);display:grid;place-items:center;color:#fff;font-family:var(--font-d);font-weight:800;font-size:20px;margin:0 auto 18px;box-shadow:0 6px 16px rgba(15,118,110,.28)}
  h1{font-family:var(--font-d);font-size:30px;font-weight:800;color:var(--ink);margin-bottom:28px;line-height:1.25;letter-spacing:-.01em}
  .rail{display:flex;height:6px;width:100%;border-radius:99px;overflow:hidden;margin:0 0 28px}
  .rail span{flex:1}
  .rail .r-open{background:repeating-linear-gradient(90deg,var(--brand) 0 10px,transparent 10px 16px)}
  .rail .r-admin{background:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:left}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  a.card{display:flex;align-items:center;justify-content:center;min-height:96px;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:14px;padding:24px;text-decoration:none;color:inherit;transition:.15s;text-align:center}
  a.card:hover{border-color:var(--brand);background:var(--brand-050);transform:translateY(-2px);box-shadow:0 10px 24px rgba(15,118,110,.14)}
  h3{font-family:var(--font-d);font-size:17px;font-weight:700;color:var(--ink)}
  .foot{margin-top:30px;font-size:12px;color:var(--muted);font-family:var(--font-b)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">WM</div>
    <h1>WM Center<br>HR Portal</h1>
    <div class="rail"><span class="r-open"></span><span class="r-admin"></span></div>
    <div class="grid">
      <a class="card" href="ta.html">
        <h3>Manpower Request Form</h3>
      </a>
      <a class="card" href="referral.html">
        <h3>Employee Referral</h3>
      </a>
      <a class="card" href="coaching.html">
        <h3>Coaching &amp; Surat Peringatan</h3>
      </a>
    </div>
    <p class="foot">WM Center · Human Resources &amp; Talent Acquisition</p>
  </div>
</body>
</html>
