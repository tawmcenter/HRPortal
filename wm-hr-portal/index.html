<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM Center — HR Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap');
  :root{
    --navy-900:#0D2D5B; --teal:#0F766E; --teal-050:#EBF5F3;
    --bg:#F6F7F9; --card:#FFFFFF; --ink:#1C2530; --muted:#6B7280; --border:#E4E7EC;
    --serif:'Fraunces',serif; --sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .wrap{max-width:900px;width:100%;text-align:center}
  .mark{width:56px;height:56px;border-radius:14px;background:linear-gradient(150deg,var(--navy-900),var(--teal));display:grid;place-items:center;color:#fff;font-family:var(--serif);font-weight:700;font-size:22px;margin:0 auto 18px;box-shadow:0 8px 20px rgba(13,45,91,.25)}
  h1{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--navy-900);margin-bottom:8px;line-height:1.25}
  p.sub{color:var(--muted);font-size:15px;margin-bottom:36px}
  .rail{display:flex;height:6px;width:100%;border-radius:99px;overflow:hidden;margin:0 0 28px}
  .rail span{flex:1}
  .rail .r-open{background:repeating-linear-gradient(90deg,var(--teal) 0 10px,transparent 10px 16px)}
  .rail .r-admin{background:var(--navy-900)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;text-align:left}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  a.card{display:flex;align-items:center;justify-content:center;min-height:96px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:24px;text-decoration:none;color:inherit;transition:.18s;text-align:center}
  a.card:hover{border-color:var(--navy-900);transform:translateY(-2px);box-shadow:0 12px 28px rgba(13,45,91,.1)}
  h3{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--navy-900)}
  .foot{margin-top:30px;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">WM</div>
    <h1>WM Center<br>HR Portal</h1>
    <p class="sub">Rekrutmen, referral karyawan, dan coaching &amp; surat peringatan — satu pintu masuk.</p>
    <div class="rail"><span class="r-open"></span><span class="r-admin"></span></div>
    <div class="grid">
      <a class="card" href="ta.html">
        <h3>Manpower Request Form</h3>
      </a>
      <a class="card" href="referral.html">
        <h3>Employee Referral</h3>
      </a>
      <a class="card" href="coaching.html">
        <h3>Coaching &amp; Surat Peringatan</h3>
      </a>
    </div>
    <p class="foot">WM Center · Human Resources &amp; Talent Acquisition</p>
  </div>
</body>
</html>
